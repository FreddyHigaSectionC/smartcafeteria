<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nav</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar" th:fragment="main-nav">
    <div class="nav-left">
        <a th:href="@{/home}" class="nav-item">Home</a>
        <a th:href="@{/menu}" class="nav-item">Menu</a>
        <a th:href="@{/orders/my_orders}" class="nav-item">View My Orders</a>
        <a th:href="@{/users/{id}(id=${userId})}" class="nav-item">Profile</a>
        <a th:href="@{/cart}" class="nav-item">Cart</a>
    </div>

    <div class="nav-right">
        <span style="color: white"><strong>Welcome, </strong><span th:text="${username}" class="username">User</span></span>
        <a th:href="@{/logout}" class="nav-item">Logout</a>
    </div>
</nav>

</body>
</html>
