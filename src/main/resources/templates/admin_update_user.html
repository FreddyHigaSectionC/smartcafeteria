<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User update page</title>
    <link rel="stylesheet" href="/style.css">

    <style>
        select {
            font-size: 16px;
            padding: 6px 10px;
        }
    </style>
</head>
<body>
    <div th:replace="/nav_admin :: sub-nav"></div>
    <div class="form-container">
        <h1>Update user account</h1>
        <form method="post" th:action="@{/admin/users/update/{id}(id=${user.id})}" th:object="${user}">
            <label>First name: <input type="text" th:field="*{first_name}" /></label>
            <label>Last name: <input type="text" th:field="*{last_name}" /></label>
            <label>Email: <input type="text" th:field="*{email}" /></label>

            <label>Role:
                <select th:field="*{role}">
                    <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">User</option>
                    <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">Admin</option>
                </select>
            </label>

            <label>Active: <input type="checkbox" th:field="*{active}"/></label>

            <button type="submit">Update Account</button>
            <button type="button" onclick="window.location.href='/admin/users'" class="cancel-btn">Cancel</button>
        </form>
    </div>
</body>
</html>
